<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>thread</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #e8e4dc;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 60px 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .page {
      background: #fffef9;
      width: 100%;
      max-width: 560px;
      min-height: 80vh;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08), 0 8px 24px rgba(0,0,0,0.06);
      padding: 48px 52px 64px;
    }

    .thread { display: flex; flex-direction: column; gap: 20px; }

    .comment-text {
      font-size: 15px;
      line-height: 1.65;
      color: #222;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .comment-time {
      font-size: 11px;
      color: #c0bdb5;
      margin-top: 4px;
    }

    .divider {
      height: 1px;
      background: #f0ede6;
      margin: 4px 0;
    }

    textarea {
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      font-size: 15px;
      font-family: inherit;
      line-height: 1.65;
      color: #222;
      background: transparent;
      caret-color: #888;
    }

    textarea::placeholder { color: #ccc; font-style: italic; }
  </style>
</head>
<body>
  <div class="page">
    <div class="thread" id="thread"></div>
    <div class="divider" id="divider" style="display:none; margin-top:20px; margin-bottom:20px;"></div>
    <textarea id="input" rows="2" placeholder="enter to comment"></textarea>
  </div>

  <script>
    const SUPABASE_URL = 'https://dekiekoxtmesfxjvakbd.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRla2lla294dG1lc2Z4anZha2JkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4Njg1ODEsImV4cCI6MjA4OTQ0NDU4MX0.0hn1_98GNYQ5zmwkp2bpTcxvZRuv3zYy8SHbBL0byu8';

    const threadEl = document.getElementById('thread');
    const dividerEl = document.getElementById('divider');

    async function fetchComments() {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/comments?select=*&order=created_at.asc`, {
        headers: { 'apikey': SUPABASE_KEY }
      });
      const comments = await res.json();
      render(comments);
    }

    function render(comments) {
      threadEl.innerHTML = comments.map(c => `
        <div class="comment">
          <div class="comment-text">${esc(c.text)}</div>
          <div class="comment-time">${ago(c.created_at)}</div>
        </div>
      `).join('');
      dividerEl.style.display = comments.length ? 'block' : 'none';
    }

    async function post() {
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';

      await fetch(`${SUPABASE_URL}/rest/v1/comments`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ text })
      });

      fetchComments();
    }

    // Realtime subscription via Supabase Realtime
    function subscribe() {
      const ws = new WebSocket(
        `${SUPABASE_URL.replace('https://', 'wss://')}/realtime/v1/websocket?apikey=${SUPABASE_KEY}&vsn=1.0.0`
      );

      ws.onopen = () => {
        // Join the realtime channel for comments table
        ws.send(JSON.stringify({
          topic: 'realtime:public:comments',
          event: 'phx_join',
          payload: { config: { broadcast: { self: true }, postgres_changes: [{ event: 'INSERT', schema: 'public', table: 'comments' }] } },
          ref: '1'
        }));
      };

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.event === 'postgres_changes' || msg.event === 'INSERT') {
          fetchComments();
        }
      };

      // Heartbeat to keep connection alive
      setInterval(() => {
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ topic: 'phoenix', event: 'heartbeat', payload: {}, ref: 'hb' }));
        }
      }, 30000);

      ws.onclose = () => setTimeout(subscribe, 3000);
    }

    document.getElementById('input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        post();
      }
    });

    function esc(s) {
      return s
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function ago(ts) {
      const s = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
      if (s < 10) return 'just now';
      if (s < 60) return `${s}s ago`;
      const m = Math.floor(s / 60);
      if (m < 60) return `${m}m ago`;
      const h = Math.floor(m / 60);
      if (h < 24) return `${h}h ago`;
      return `${Math.floor(h / 24)}d ago`;
    }

    // Initial load + realtime
    fetchComments();
    subscribe();
    // Also poll as fallback
    setInterval(fetchComments, 30000);
  </script>
</body>
</html>
